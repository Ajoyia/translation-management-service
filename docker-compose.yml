version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: translation-api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - translation-network
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: translation-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - translation-network
    depends_on:
      - app

  redis:
    image: redis:alpine
    container_name: translation-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - translation-network

networks:
  translation-network:
    driver: bridge
